services:
  - type: web
    name: ecowaste-int219-abhinavduvva124
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    disk:
      name: ecowaste-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_PATH
        value: /var/data/ecowaste.db
      - key: ALLOWED_ORIGINS
        value: https://*.vercel.app
      - key: JWT_SECRET
        generateValue: true
      - key: SESSION_SECRET
        generateValue: true
